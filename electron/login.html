<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratus — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #1e3a5f;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 1rem;
    }
    .logo-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
    }
    h1 { font-size: 1.75rem; font-weight: 700; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
    .card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(10px);
    }
    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.8125rem;
      color: #94a3b8;
      margin-bottom: 0.375rem;
    }
    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #3b82f6; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      background: #3b82f6;
      color: white;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    .error {
      color: #ef4444;
      font-size: 0.8125rem;
      text-align: center;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 6px;
    }
    .error.hidden { display: none; }
    .version {
      text-align: center;
      color: #475569;
      font-size: 0.75rem;
      margin-top: 1.5rem;
    }
    .shake {
      animation: shake 0.5s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-circle">
        <div class="logo-dot"></div>
      </div>
      <h1>STRATUS</h1>
      <p class="subtitle">Weather Station Manager — Desktop</p>
    </div>

    <div class="card" id="loginCard">
      <div class="error hidden" id="errorMsg">Incorrect password. Please try again.</div>
      <div class="input-group">
        <label>Application Password</label>
        <input type="password" id="password" placeholder="Enter password" autofocus
               onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn" onclick="login()" id="loginBtn">Unlock Stratus</button>
    </div>

    <div class="version">Stratus v1.1.0 — Desktop Edition<br>© 2025-2026 Lukas Esterhuizen</div>
  </div>

  <script>
    let attempts = 0;

    async function login() {
      const password = document.getElementById('password').value;
      if (!password) return;

      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Verifying...';

      const valid = await window.stratusDesktop.auth.verifyPassword(password);
      
      if (valid) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;"><div style="width:64px;height:64px;border-radius:50%;background:#1e3a5f;display:inline-flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.1);margin-bottom:1rem;"><div style="width:20px;height:20px;border-radius:50%;background:white;"></div></div><h2 style="margin-bottom:0.5rem;">Starting Stratus...</h2><p style="color:#94a3b8;font-size:0.875rem;">Loading weather station manager</p></div>';
        setTimeout(() => {
          window.location.href = 'http://localhost:5000';
        }, 1500);
      } else {
        attempts++;
        const errorEl = document.getElementById('errorMsg');
        errorEl.classList.remove('hidden');
        errorEl.textContent = attempts >= 3
          ? `Incorrect password (${attempts} attempts). Please try again.`
          : 'Incorrect password. Please try again.';
        
        const card = document.getElementById('loginCard');
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
        
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        loginBtn.disabled = false;
        loginBtn.textContent = 'Unlock Stratus';
      }
    }
  </script>
</body>
</html>
