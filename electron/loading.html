<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratus — Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #f1f5f9);
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo-circle {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 50%;
      background: #1e3a5f;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,.1);
      margin-bottom: 1rem;
    }
    .logo-dot {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background: white;
    }
    h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 0.25rem;
    }
    p {
      font-size: 0.875rem;
      color: #6b7280;
    }
    .spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo-circle">
    <div class="logo-dot"></div>
  </div>
  <h2>Starting Stratus...</h2>
  <p>Loading weather station manager</p>
  <div class="spinner"></div>
</body>
</html>
