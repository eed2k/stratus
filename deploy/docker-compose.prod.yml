# =============================================================================
# Docker Compose for Production — Vultr Managed PostgreSQL + Traefik SSL
# =============================================================================
#
# This configuration uses:
#   - Vultr Managed PostgreSQL (external) — no local postgres container
#   - Traefik v2 for automatic Let's Encrypt SSL on stratusweather.co.za
#
# Required environment variables in .env:
#   DATABASE_URL          Vultr PostgreSQL connection string (sslmode=require)
#   CLIENT_JWT_SECRET     JWT signing secret (openssl rand -hex 32)
#   STRATUS_ADMIN_EMAIL   Initial admin user email
#   STRATUS_ADMIN_PASSWORD Initial admin password
#   ACME_EMAIL            Email for Let's Encrypt certificate notifications
#   DOMAIN                Primary domain (stratusweather.co.za)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
# =============================================================================

services:
  stratus:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: stratus-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - STRATUS_DATA_DIR=/app/data
      # Vultr Managed PostgreSQL connection
      - DATABASE_URL=${DATABASE_URL}
      - CLIENT_JWT_SECRET=${CLIENT_JWT_SECRET}
      - STRATUS_ADMIN_EMAIL=${STRATUS_ADMIN_EMAIL}
      - STRATUS_ADMIN_PASSWORD=${STRATUS_ADMIN_PASSWORD}
      - STRATUS_ADMIN_NAME=${STRATUS_ADMIN_NAME:-Admin}
      # Dropbox sync
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET}
      - DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN}
      - DROPBOX_FOLDER_PATH=${DROPBOX_FOLDER_PATH}
      - DROPBOX_STATION_ID=${DROPBOX_STATION_ID:-1}
      # MailerSend Email
      - MAILERSEND_API_KEY=${MAILERSEND_API_KEY}
      - MAILERSEND_FROM_EMAIL=${MAILERSEND_FROM_EMAIL:-noreply@stratusweather.co.za}
      - MAILERSEND_FROM_NAME=${MAILERSEND_FROM_NAME:-Stratus Weather}
      - MAILERSEND_ALERTS_EMAIL=${MAILERSEND_ALERTS_EMAIL:-alerts@stratusweather.co.za}
      # Public URL for email links
      - APP_BASE_URL=${APP_BASE_URL:-https://stratusweather.co.za}
      # Staleness Monitor
      - STALENESS_CHECK_INTERVAL=${STALENESS_CHECK_INTERVAL:-900000}
      - STALENESS_THRESHOLD=${STALENESS_THRESHOLD:-7200000}
      - STALENESS_COOLDOWN=${STALENESS_COOLDOWN:-21600000}
    volumes:
      - stratus-data:/app/data
      - stratus-logs:/app/logs
    networks:
      - stratus-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Main domain
      - "traefik.http.routers.stratus.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.stratus.entrypoints=websecure"
      - "traefik.http.routers.stratus.tls.certresolver=letsencrypt"
      - "traefik.http.services.stratus.loadbalancer.server.port=5000"
      # www redirect → apex
      - "traefik.http.routers.stratus-www.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.stratus-www.entrypoints=websecure"
      - "traefik.http.routers.stratus-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.stratus-www.middlewares=www-redirect"
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"

  traefik:
    image: traefik:v2.11
    container_name: stratus-traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=stratus_stratus-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - stratus-network

volumes:
  stratus-data:
  stratus-logs:
  letsencrypt-data:

networks:
  stratus-network:
    driver: bridge
