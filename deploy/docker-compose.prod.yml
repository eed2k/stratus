# Docker Compose for Production with Vultr Managed PostgreSQL
# 
# This configuration uses an external managed PostgreSQL database
# instead of a local container, reducing CPU load and providing
# automatic backups, scaling, and maintenance.
#
# Required environment variables in .env:
# - DATABASE_URL: Vultr Managed PostgreSQL connection string
#   Format: postgresql://user:password@host:port/database?sslmode=require
#
# To use local PostgreSQL container instead, use docker-compose.yml

services:
  stratus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratus-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_JWT_SECRET=${CLIENT_JWT_SECRET}
      - STRATUS_ADMIN_EMAIL=${STRATUS_ADMIN_EMAIL}
      - STRATUS_ADMIN_PASSWORD=${STRATUS_ADMIN_PASSWORD}
      - STRATUS_ADMIN_NAME=${STRATUS_ADMIN_NAME}
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET}
      - DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN}
      - DROPBOX_FOLDER_PATH=${DROPBOX_FOLDER_PATH}
      # Vultr Managed PostgreSQL connection
      - DATABASE_URL=${DATABASE_URL}
    network_mode: host
    volumes:
      - stratus-data:/home/stratus/.local/share/Stratus Weather Server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  stratus-data:
