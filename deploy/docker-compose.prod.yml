services:
  stratus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratus-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_JWT_SECRET=${CLIENT_JWT_SECRET}
      - STRATUS_ADMIN_EMAIL=${STRATUS_ADMIN_EMAIL}
      - STRATUS_ADMIN_PASSWORD=${STRATUS_ADMIN_PASSWORD}
      - STRATUS_ADMIN_NAME=${STRATUS_ADMIN_NAME}
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET}
      - DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN}
      - DROPBOX_FOLDER_PATH=${DROPBOX_FOLDER_PATH}
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - stratus-data:/home/stratus/.local/share/Stratus Weather Server

  postgres:
    image: postgres:15-alpine
    container_name: stratus-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=stratus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=stratus
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratus -d stratus"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stratus-data:
  postgres-data:
