# =============================================================================
# Nginx config for stratusweather.co.za
# NOTE: This is only needed if NOT using Traefik (docker-compose.prod.yml
#       already includes Traefik with auto-SSL). Use this if you prefer
#       nginx+certbot on the host instead of Traefik in Docker.
#
# Install: sudo cp deploy/nginx-stratus.conf /etc/nginx/sites-available/stratus
#          sudo ln -sf /etc/nginx/sites-available/stratus /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d stratusweather.co.za -d www.stratusweather.co.za
#          sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Redirect www → apex
server {
    listen 80;
    server_name www.stratusweather.co.za;
    return 301 https://stratusweather.co.za$request_uri;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name stratusweather.co.za;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name stratusweather.co.za;

    # SSL managed by certbot (these lines added automatically by certbot)
    # ssl_certificate /etc/letsencrypt/live/stratusweather.co.za/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/stratusweather.co.za/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Stratus app on port 5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;

        # WebSocket support
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
    }

    # Larger body for data ingest
    client_max_body_size 50M;
}
