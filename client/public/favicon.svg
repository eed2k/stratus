<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Cloud with sun - Stratus Weather Station -->
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sun behind cloud -->
  <circle cx="24" cy="10" r="6" fill="url(#sunGrad)"/>
  
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round">
    <line x1="24" y1="1" x2="24" y2="3"/>
    <line x1="30" y1="4" x2="28.5" y2="5.5"/>
    <line x1="31" y1="10" x2="29" y2="10"/>
    <line x1="30" y1="16" x2="28.5" y2="14.5"/>
  </g>
  
  <!-- Main cloud -->
  <path d="M8 26c-3.3 0-6-2.7-6-6 0-2.9 2.1-5.3 4.8-5.9C7.1 10.6 10.2 8 14 8c4.4 0 8 3.6 8 8 0 .3 0 .7-.1 1 2.3.5 4.1 2.6 4.1 5 0 2.8-2.2 5-5 5H8z" fill="url(#cloudGrad)"/>
  
  <!-- Cloud highlight -->
  <path d="M10 14c0-2.2 1.8-4 4-4 1.8 0 3.3 1.2 3.8 2.8" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
