<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="tempGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="humGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="#1e293b"/>
  <text x="20" y="32" font-family="Arial" font-size="18" font-weight="bold" fill="#3b82f6">☁ Stratus</text>
  <text x="120" y="32" font-family="Arial" font-size="14" fill="#94a3b8">Charts &amp; Analytics</text>
  
  <!-- Sidebar -->
  <rect x="0" y="50" width="60" height="450" fill="#1e293b"/>
  <rect x="10" y="70" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="120" width="40" height="40" rx="8" fill="#3b82f6" opacity="0.2"/>
  <rect x="10" y="170" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="220" width="40" height="40" rx="8" fill="#334155"/>
  
  <!-- Main Content -->
  <rect x="70" y="60" width="720" height="430" fill="#ffffff" rx="8"/>
  
  <!-- Title -->
  <text x="90" y="95" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b">Weather Trends - Last 7 Days</text>
  
  <!-- Date Range Selector -->
  <rect x="600" y="75" width="170" height="30" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="615" y="95" font-family="Arial" font-size="11" fill="#64748b">Jan 13 - Jan 20, 2026</text>
  
  <!-- Temperature Chart -->
  <rect x="90" y="115" width="340" height="180" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="105" y="140" font-family="Arial" font-size="13" font-weight="bold" fill="#1e293b">Temperature</text>
  <text x="360" y="140" font-family="Arial" font-size="11" fill="#ef4444">● Avg: 22.4°C</text>
  
  <!-- Temp Chart Grid -->
  <line x1="120" y1="160" x2="410" y2="160" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="120" y1="190" x2="410" y2="190" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="120" y1="220" x2="410" y2="220" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="120" y1="250" x2="410" y2="250" stroke="#f1f5f9" stroke-width="1"/>
  
  <!-- Temp Y-axis labels -->
  <text x="105" y="165" font-family="Arial" font-size="9" fill="#94a3b8">35°</text>
  <text x="105" y="195" font-family="Arial" font-size="9" fill="#94a3b8">25°</text>
  <text x="105" y="225" font-family="Arial" font-size="9" fill="#94a3b8">15°</text>
  <text x="105" y="255" font-family="Arial" font-size="9" fill="#94a3b8">5°</text>
  
  <!-- Temperature Line Chart -->
  <path d="M130,210 L170,200 L210,185 L250,195 L290,180 L330,190 L370,175 L400,185" 
        fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polygon points="130,210 170,200 210,185 250,195 290,180 330,190 370,175 400,185 400,260 130,260" 
           fill="url(#tempGrad)"/>
  
  <!-- Temp X-axis labels -->
  <text x="125" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Mon</text>
  <text x="165" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Tue</text>
  <text x="205" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Wed</text>
  <text x="245" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Thu</text>
  <text x="285" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Fri</text>
  <text x="325" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Sat</text>
  <text x="365" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Sun</text>
  
  <!-- Humidity Chart -->
  <rect x="450" y="115" width="320" height="180" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="465" y="140" font-family="Arial" font-size="13" font-weight="bold" fill="#1e293b">Humidity</text>
  <text x="700" y="140" font-family="Arial" font-size="11" fill="#3b82f6">● Avg: 62%</text>
  
  <!-- Humidity Chart Grid -->
  <line x1="480" y1="160" x2="750" y2="160" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="480" y1="190" x2="750" y2="190" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="480" y1="220" x2="750" y2="220" stroke="#f1f5f9" stroke-width="1"/>
  <line x1="480" y1="250" x2="750" y2="250" stroke="#f1f5f9" stroke-width="1"/>
  
  <!-- Humidity Y-axis labels -->
  <text x="462" y="165" font-family="Arial" font-size="9" fill="#94a3b8">100%</text>
  <text x="466" y="195" font-family="Arial" font-size="9" fill="#94a3b8">75%</text>
  <text x="466" y="225" font-family="Arial" font-size="9" fill="#94a3b8">50%</text>
  <text x="466" y="255" font-family="Arial" font-size="9" fill="#94a3b8">25%</text>
  
  <!-- Humidity Line Chart -->
  <path d="M490,200 L530,185 L570,210 L610,195 L650,220 L690,205 L730,215" 
        fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="490,200 530,185 570,210 610,195 650,220 690,205 730,215 730,260 490,260" 
           fill="url(#humGrad)"/>
  
  <!-- Humidity X-axis labels -->
  <text x="485" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Mon</text>
  <text x="525" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Tue</text>
  <text x="565" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Wed</text>
  <text x="605" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Thu</text>
  <text x="645" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Fri</text>
  <text x="685" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Sat</text>
  <text x="725" y="280" font-family="Arial" font-size="9" fill="#94a3b8">Sun</text>
  
  <!-- Pressure & Wind Chart -->
  <rect x="90" y="305" width="340" height="175" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="105" y="330" font-family="Arial" font-size="13" font-weight="bold" fill="#1e293b">Barometric Pressure</text>
  <text x="330" y="330" font-family="Arial" font-size="11" fill="#8b5cf6">● Stable</text>
  
  <!-- Pressure bars -->
  <rect x="130" y="360" width="30" height="80" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <rect x="175" y="350" width="30" height="90" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <rect x="220" y="355" width="30" height="85" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <rect x="265" y="365" width="30" height="75" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <rect x="310" y="345" width="30" height="95" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <rect x="355" y="358" width="30" height="82" rx="4" fill="#8b5cf6" opacity="0.8"/>
  <rect x="395" y="352" width="30" height="88" rx="4" fill="#8b5cf6" opacity="0.8"/>
  
  <!-- Pressure labels -->
  <text x="135" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Mon</text>
  <text x="180" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Tue</text>
  <text x="225" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Wed</text>
  <text x="270" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Thu</text>
  <text x="315" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Fri</text>
  <text x="360" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Sat</text>
  <text x="400" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Sun</text>
  
  <!-- Wind Speed Chart -->
  <rect x="450" y="305" width="320" height="175" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="465" y="330" font-family="Arial" font-size="13" font-weight="bold" fill="#1e293b">Wind Speed</text>
  <text x="700" y="330" font-family="Arial" font-size="11" fill="#06b6d4">● Max: 18.5 m/s</text>
  
  <!-- Wind bars -->
  <rect x="490" y="380" width="25" height="55" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="530" y="360" width="25" height="75" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="570" y="390" width="25" height="45" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="610" y="345" width="25" height="90" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="650" y="370" width="25" height="65" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="690" y="385" width="25" height="50" rx="4" fill="#06b6d4" opacity="0.8"/>
  <rect x="730" y="355" width="25" height="80" rx="4" fill="#06b6d4" opacity="0.8"/>
  
  <!-- Wind labels -->
  <text x="493" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Mon</text>
  <text x="533" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Tue</text>
  <text x="573" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Wed</text>
  <text x="613" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Thu</text>
  <text x="653" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Fri</text>
  <text x="693" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Sat</text>
  <text x="733" y="455" font-family="Arial" font-size="9" fill="#94a3b8">Sun</text>
</svg>