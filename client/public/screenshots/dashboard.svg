<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="#1e293b"/>
  <text x="20" y="32" font-family="Arial" font-size="18" font-weight="bold" fill="#3b82f6">☁ Stratus</text>
  <text x="120" y="32" font-family="Arial" font-size="14" fill="#94a3b8">Dashboard</text>
  
  <!-- Sidebar -->
  <rect x="0" y="50" width="60" height="450" fill="#1e293b"/>
  <rect x="10" y="70" width="40" height="40" rx="8" fill="#3b82f6" opacity="0.2"/>
  <rect x="10" y="120" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="170" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="220" width="40" height="40" rx="8" fill="#334155"/>
  
  <!-- Main Content Area -->
  <rect x="70" y="60" width="720" height="430" fill="#ffffff" rx="8"/>
  
  <!-- Station Header -->
  <text x="90" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#1e293b">HOPEFIELD CR300</text>
  <text x="90" y="115" font-family="Arial" font-size="12" fill="#64748b">Last updated: 2 minutes ago</text>
  <circle cx="280" cy="105" r="6" fill="#22c55e"/>
  <text x="292" y="110" font-family="Arial" font-size="11" fill="#22c55e">Online</text>
  
  <!-- Weather Cards Row 1 -->
  <!-- Temperature Card -->
  <rect x="90" y="130" width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="105" y="155" font-family="Arial" font-size="11" fill="#64748b">Temperature</text>
  <text x="105" y="195" font-family="Arial" font-size="32" font-weight="bold" fill="#ef4444">24.5°C</text>
  <text x="105" y="218" font-family="Arial" font-size="10" fill="#94a3b8">↑ 28.2° ↓ 18.1°</text>
  
  <!-- Humidity Card -->
  <rect x="260" y="130" width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="155" font-family="Arial" font-size="11" fill="#64748b">Humidity</text>
  <text x="275" y="195" font-family="Arial" font-size="32" font-weight="bold" fill="#3b82f6">68%</text>
  <text x="275" y="218" font-family="Arial" font-size="10" fill="#94a3b8">↑ 85% ↓ 45%</text>
  
  <!-- Wind Speed Card -->
  <rect x="430" y="130" width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="445" y="155" font-family="Arial" font-size="11" fill="#64748b">Wind Speed</text>
  <text x="445" y="195" font-family="Arial" font-size="32" font-weight="bold" fill="#06b6d4">12.3</text>
  <text x="530" y="195" font-family="Arial" font-size="14" fill="#64748b">m/s</text>
  <text x="445" y="218" font-family="Arial" font-size="10" fill="#94a3b8">Gust: 18.5 m/s</text>
  
  <!-- Pressure Card -->
  <rect x="600" y="130" width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="615" y="155" font-family="Arial" font-size="11" fill="#64748b">Pressure</text>
  <text x="615" y="195" font-family="Arial" font-size="32" font-weight="bold" fill="#8b5cf6">1013</text>
  <text x="690" y="195" font-family="Arial" font-size="14" fill="#64748b">hPa</text>
  <text x="615" y="218" font-family="Arial" font-size="10" fill="#94a3b8">Stable</text>
  
  <!-- Weather Cards Row 2 -->
  <!-- Rainfall Card -->
  <rect x="90" y="240" width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="105" y="265" font-family="Arial" font-size="11" fill="#64748b">Rainfall (24h)</text>
  <text x="105" y="305" font-family="Arial" font-size="32" font-weight="bold" fill="#0ea5e9">2.4</text>
  <text x="155" y="305" font-family="Arial" font-size="14" fill="#64748b">mm</text>
  <text x="105" y="328" font-family="Arial" font-size="10" fill="#94a3b8">Monthly: 45.2 mm</text>
  
  <!-- Solar Radiation Card -->
  <rect x="260" y="240" width="160" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="265" font-family="Arial" font-size="11" fill="#64748b">Solar Radiation</text>
  <text x="275" y="305" font-family="Arial" font-size="32" font-weight="bold" fill="#f59e0b">856</text>
  <text x="340" y="305" font-family="Arial" font-size="14" fill="#64748b">W/m²</text>
  <text x="275" y="328" font-family="Arial" font-size="10" fill="#94a3b8">Clear sky</text>
  
  <!-- Chart Area -->
  <rect x="430" y="240" width="330" height="200" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="445" y="265" font-family="Arial" font-size="12" font-weight="bold" fill="#1e293b">Temperature (24h)</text>
  
  <!-- Chart Grid Lines -->
  <line x1="460" y1="290" x2="740" y2="290" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="460" y1="330" x2="740" y2="330" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="460" y1="370" x2="740" y2="370" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="460" y1="410" x2="740" y2="410" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Chart Line -->
  <polyline points="460,380 490,370 520,350 550,340 580,320 610,310 640,300 670,310 700,330 730,350" 
            fill="none" stroke="#ef4444" stroke-width="2"/>
  <polyline points="460,380 490,370 520,350 550,340 580,320 610,310 640,300 670,310 700,330 730,350" 
            fill="url(#chartGrad)" stroke="none" opacity="0.2"/>
  
  <!-- Chart Labels -->
  <text x="455" y="295" font-family="Arial" font-size="9" fill="#94a3b8">30°</text>
  <text x="455" y="335" font-family="Arial" font-size="9" fill="#94a3b8">25°</text>
  <text x="455" y="375" font-family="Arial" font-size="9" fill="#94a3b8">20°</text>
  <text x="455" y="415" font-family="Arial" font-size="9" fill="#94a3b8">15°</text>
  <text x="460" y="430" font-family="Arial" font-size="9" fill="#94a3b8">00:00</text>
  <text x="560" y="430" font-family="Arial" font-size="9" fill="#94a3b8">08:00</text>
  <text x="660" y="430" font-family="Arial" font-size="9" fill="#94a3b8">16:00</text>
  <text x="720" y="430" font-family="Arial" font-size="9" fill="#94a3b8">Now</text>
  
  <!-- Battery Status -->
  <rect x="90" y="350" width="160" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="105" y="375" font-family="Arial" font-size="11" fill="#64748b">Battery</text>
  <rect x="105" y="390" width="130" height="20" rx="4" fill="#e2e8f0"/>
  <rect x="105" y="390" width="110" height="20" rx="4" fill="#22c55e"/>
  <text x="155" y="405" font-family="Arial" font-size="11" font-weight="bold" fill="#ffffff">12.8V</text>
  <text x="105" y="430" font-family="Arial" font-size="10" fill="#94a3b8">Good condition</text>
  
  <!-- Signal Strength -->
  <rect x="260" y="350" width="160" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="375" font-family="Arial" font-size="11" fill="#64748b">Signal Strength</text>
  <rect x="280" y="395" width="8" height="25" rx="2" fill="#22c55e"/>
  <rect x="295" y="390" width="8" height="30" rx="2" fill="#22c55e"/>
  <rect x="310" y="385" width="8" height="35" rx="2" fill="#22c55e"/>
  <rect x="325" y="380" width="8" height="40" rx="2" fill="#22c55e"/>
  <rect x="340" y="395" width="8" height="25" rx="2" fill="#d1d5db"/>
  <text x="275" y="430" font-family="Arial" font-size="10" fill="#94a3b8">4G LTE: Excellent</text>
</svg>