<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg4)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="50" fill="#1e293b"/>
  <text x="20" y="32" font-family="Arial" font-size="18" font-weight="bold" fill="#3b82f6">☁ Stratus</text>
  <text x="120" y="32" font-family="Arial" font-size="14" fill="#94a3b8">Reports</text>
  
  <!-- Sidebar -->
  <rect x="0" y="50" width="60" height="450" fill="#1e293b"/>
  <rect x="10" y="70" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="120" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="170" width="40" height="40" rx="8" fill="#334155"/>
  <rect x="10" y="220" width="40" height="40" rx="8" fill="#3b82f6" opacity="0.2"/>
  
  <!-- Main Content -->
  <rect x="70" y="60" width="720" height="430" fill="#ffffff" rx="8"/>
  
  <!-- Title -->
  <text x="90" y="95" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b">Report Generator</text>
  
  <!-- Report Configuration Panel -->
  <rect x="90" y="115" width="350" height="360" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="110" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b">Configure Report</text>
  
  <!-- Station Select -->
  <text x="110" y="175" font-family="Arial" font-size="11" fill="#64748b">Select Station</text>
  <rect x="110" y="185" width="310" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="125" y="208" font-family="Arial" font-size="12" fill="#1e293b">HOPEFIELD CR300</text>
  <text x="380" y="208" font-family="Arial" font-size="10" fill="#94a3b8">▼</text>
  
  <!-- Date Range -->
  <text x="110" y="245" font-family="Arial" font-size="11" fill="#64748b">Date Range</text>
  <rect x="110" y="255" width="145" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="125" y="278" font-family="Arial" font-size="11" fill="#1e293b">Jan 01, 2026</text>
  <text x="265" y="278" font-family="Arial" font-size="12" fill="#94a3b8">→</text>
  <rect x="275" y="255" width="145" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="290" y="278" font-family="Arial" font-size="11" fill="#1e293b">Jan 20, 2026</text>
  
  <!-- Report Type -->
  <text x="110" y="315" font-family="Arial" font-size="11" fill="#64748b">Report Type</text>
  <rect x="110" y="325" width="310" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="125" y="348" font-family="Arial" font-size="12" fill="#1e293b">Comprehensive Weather Summary</text>
  <text x="380" y="348" font-family="Arial" font-size="10" fill="#94a3b8">▼</text>
  
  <!-- Include Options -->
  <text x="110" y="385" font-family="Arial" font-size="11" fill="#64748b">Include in Report</text>
  
  <rect x="110" y="395" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="108" y="407" font-family="Arial" font-size="11" fill="#ffffff">✓</text>
  <text x="135" y="407" font-family="Arial" font-size="11" fill="#1e293b">Temperature Statistics</text>
  
  <rect x="270" y="395" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="268" y="407" font-family="Arial" font-size="11" fill="#ffffff">✓</text>
  <text x="295" y="407" font-family="Arial" font-size="11" fill="#1e293b">Wind Analysis</text>
  
  <rect x="110" y="420" width="16" height="16" rx="3" fill="#3b82f6"/>
  <text x="108" y="432" font-family="Arial" font-size="11" fill="#ffffff">✓</text>
  <text x="135" y="432" font-family="Arial" font-size="11" fill="#1e293b">Rainfall Data</text>
  
  <rect x="270" y="420" width="16" height="16" rx="3" fill="#e2e8f0" stroke="#d1d5db"/>
  <text x="295" y="432" font-family="Arial" font-size="11" fill="#1e293b">Include Charts</text>
  
  <!-- Generate Buttons -->
  <rect x="110" y="450" width="145" height="40" rx="6" fill="#3b82f6"/>
  <text x="140" y="476" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff">📄 Generate PDF</text>
  
  <rect x="265" y="450" width="145" height="40" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="295" y="476" font-family="Arial" font-size="12" font-weight="bold" fill="#1e293b">📊 Export CSV</text>
  
  <!-- Report Preview Panel -->
  <rect x="460" y="115" width="310" height="360" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="480" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b">Report Preview</text>
  
  <!-- PDF Preview -->
  <rect x="480" y="160" width="270" height="295" fill="#f8fafc" stroke="#e2e8f0"/>
  
  <!-- PDF Header -->
  <rect x="495" y="175" width="240" height="35" fill="#1e293b"/>
  <text x="510" y="198" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">Weather Report</text>
  <text x="640" y="198" font-family="Arial" font-size="10" fill="#94a3b8">STRATUS</text>
  
  <!-- Report Content -->
  <text x="495" y="230" font-family="Arial" font-size="10" font-weight="bold" fill="#1e293b">Station: HOPEFIELD CR300</text>
  <text x="495" y="245" font-family="Arial" font-size="9" fill="#64748b">Period: Jan 01 - Jan 20, 2026</text>
  
  <line x1="495" y1="255" x2="735" y2="255" stroke="#e2e8f0"/>
  
  <text x="495" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#1e293b">Temperature Summary</text>
  <text x="495" y="292" font-family="Arial" font-size="9" fill="#64748b">Average: 22.4°C</text>
  <text x="495" y="305" font-family="Arial" font-size="9" fill="#64748b">Maximum: 31.2°C</text>
  <text x="495" y="318" font-family="Arial" font-size="9" fill="#64748b">Minimum: 14.8°C</text>
  
  <text x="615" y="275" font-family="Arial" font-size="10" font-weight="bold" fill="#1e293b">Humidity Summary</text>
  <text x="615" y="292" font-family="Arial" font-size="9" fill="#64748b">Average: 62%</text>
  <text x="615" y="305" font-family="Arial" font-size="9" fill="#64748b">Maximum: 92%</text>
  <text x="615" y="318" font-family="Arial" font-size="9" fill="#64748b">Minimum: 35%</text>
  
  <line x1="495" y1="330" x2="735" y2="330" stroke="#e2e8f0"/>
  
  <text x="495" y="350" font-family="Arial" font-size="10" font-weight="bold" fill="#1e293b">Wind Statistics</text>
  <text x="495" y="367" font-family="Arial" font-size="9" fill="#64748b">Average Speed: 8.4 m/s</text>
  <text x="495" y="380" font-family="Arial" font-size="9" fill="#64748b">Maximum Gust: 22.1 m/s</text>
  <text x="495" y="393" font-family="Arial" font-size="9" fill="#64748b">Dominant Direction: S</text>
  
  <text x="615" y="350" font-family="Arial" font-size="10" font-weight="bold" fill="#1e293b">Rainfall</text>
  <text x="615" y="367" font-family="Arial" font-size="9" fill="#64748b">Total: 45.2 mm</text>
  <text x="615" y="380" font-family="Arial" font-size="9" fill="#64748b">Rainy Days: 8</text>
  <text x="615" y="393" font-family="Arial" font-size="9" fill="#64748b">Max Daily: 12.4 mm</text>
  
  <line x1="495" y1="405" x2="735" y2="405" stroke="#e2e8f0"/>
  
  <!-- Mini chart placeholder -->
  <rect x="495" y="415" width="115" height="30" rx="4" fill="#ef444420" stroke="#ef4444" stroke-opacity="0.3"/>
  <text x="520" y="435" font-family="Arial" font-size="8" fill="#64748b">Temp Chart</text>
  
  <rect x="615" y="415" width="115" height="30" rx="4" fill="#3b82f620" stroke="#3b82f6" stroke-opacity="0.3"/>
  <text x="635" y="435" font-family="Arial" font-size="8" fill="#64748b">Humidity Chart</text>
</svg>