appId: com.stratus.weather
productName: Stratus Weather Station Manager
copyright: "© 2025-2026 Lukas Esterhuizen"

directories:
  buildResources: assets
  output: release

files:
  - electron.js
  - electron/**/*
  - dist/**/*
  - shared/**/*
  - assets/icons/**/*
  - package.json
  - "!node_modules/typescript/**"
  - "!node_modules/@types/**"
  - "!node_modules/eslint/**"
  - "!client/src/**"
  - "!server/**/*.ts"
  - "!scripts/**"
  - "!deploy/**"
  - "!demo_data/**"
  - "!docs/**"
  - "!logs/**"

extraResources:
  - from: ".env"
    to: ".env"
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon-256.png
  artifactName: "Stratus-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icons/icon-256.png
  uninstallerIcon: assets/icons/icon-256.png
  installerHeaderIcon: assets/icons/icon-256.png
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Stratus Weather
  license: LICENSE.txt
  perMachine: false
  allowElevation: true
  runAfterFinish: true

asar: true

electronVersion: "28.0.0"

nodeGypRebuild: false

npmRebuild: true
