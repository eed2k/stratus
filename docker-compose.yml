services:
  stratus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stratus-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - STRATUS_DATA_DIR=/app/data
      - DATABASE_URL=${DATABASE_URL}
      - CLIENT_JWT_SECRET=${CLIENT_JWT_SECRET}
      - STRATUS_ADMIN_EMAIL=${STRATUS_ADMIN_EMAIL}
      - STRATUS_ADMIN_PASSWORD=${STRATUS_ADMIN_PASSWORD}
      - STRATUS_ADMIN_NAME=${STRATUS_ADMIN_NAME:-Admin}
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET}
      - DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN}
      - DROPBOX_FOLDER_PATH=${DROPBOX_FOLDER_PATH}
      - DROPBOX_STATION_ID=${DROPBOX_STATION_ID}
      - MAILERSEND_API_KEY=${MAILERSEND_API_KEY}
      - MAILERSEND_FROM_EMAIL=${MAILERSEND_FROM_EMAIL}
      - MAILERSEND_FROM_NAME=${MAILERSEND_FROM_NAME:-Stratus Weather}
      - MAILERSEND_ALERTS_EMAIL=${MAILERSEND_ALERTS_EMAIL}
      - APP_BASE_URL=${PUBLIC_URL:-https://stratusweather.co.za}
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - stratus-data:/app/data
      - stratus-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stratus-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Main domain
      - "traefik.http.routers.stratus.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.stratus.entrypoints=websecure"
      - "traefik.http.routers.stratus.tls.certresolver=letsencrypt"
      - "traefik.http.services.stratus.loadbalancer.server.port=5000"
      # www redirect → apex
      - "traefik.http.routers.stratus-www.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.stratus-www.entrypoints=websecure"
      - "traefik.http.routers.stratus-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.stratus-www.middlewares=www-redirect"
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"

  postgres:
    image: postgres:15-alpine
    container_name: stratus-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=stratus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=stratus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - stratus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratus -d stratus"]
      interval: 10s
      timeout: 5s
      retries: 5

  traefik:
    image: traefik:v2.11
    container_name: stratus-traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=stratus_stratus-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - stratus-network

volumes:
  stratus-data:
  stratus-logs:
  postgres-data:
  letsencrypt-data:

networks:
  stratus-network:
    driver: bridge
